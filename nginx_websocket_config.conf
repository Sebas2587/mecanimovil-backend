# Configuración de Nginx para Mecanimovil con WebSockets
# Archivo: /etc/nginx/sites-available/mecanimovil

upstream mecanimovil_backend {
    server 127.0.0.1:8000;
}

# Configuración para el servidor HTTP
server {
    listen 80;
    server_name api.mecanimovil.com www.api.mecanimovil.com;
    
    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuración para el servidor HTTPS
server {
    listen 443 ssl http2;
    server_name api.mecanimovil.com www.api.mecanimovil.com;
    
    # Configuración SSL
    ssl_certificate /etc/letsencrypt/live/api.mecanimovil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mecanimovil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Configuración de seguridad
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Configuración de archivos estáticos
    location /static/ {
        alias /var/www/mecanimovil/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Configuración de archivos media
    location /media/ {
        alias /var/www/mecanimovil/media/;
        expires 1y;
        add_header Cache-Control "public";
    }
    
    # Configuración para WebSockets
    location /ws/ {
        proxy_pass http://mecanimovil_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración específica para WebSockets
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
        
        # Configuración de buffer para WebSockets
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Configuración para la API REST
    location / {
        proxy_pass http://mecanimovil_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración de timeout para API
        proxy_read_timeout 60;
        proxy_send_timeout 60;
        proxy_connect_timeout 60;
        
        # Configuración de buffer para API
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Configuración de logging
    access_log /var/log/nginx/mecanimovil_access.log;
    error_log /var/log/nginx/mecanimovil_error.log;
}

# Configuración para la app de clientes
server {
    listen 443 ssl http2;
    server_name app.mecanimovil.com www.app.mecanimovil.com;
    
    # Configuración SSL
    ssl_certificate /etc/letsencrypt/live/app.mecanimovil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mecanimovil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Configuración de seguridad
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Configuración para React Native/Expo
    location / {
        root /var/www/mecanimovil/client-app;
        try_files $uri $uri/ /index.html;
        
        # Configuración de cache para archivos estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Configuración de logging
    access_log /var/log/nginx/mecanimovil_client_access.log;
    error_log /var/log/nginx/mecanimovil_client_error.log;
}

