# Render Blueprint - Configuración de infraestructura para MecaniMovil
# Documentación: https://render.com/docs/blueprint-spec

databases:
  # Base de datos PostgreSQL con PostGIS
  # Planes disponibles:
  # - free (gratis, expira en 30 días, 1GB storage)
  # - basic-256mb, basic-1gb, basic-4gb (planes básicos)
  # - pro-4gb, pro-8gb, pro-16gb, etc. (planes profesionales)
  # - accelerated-16gb, accelerated-32gb, etc. (planes acelerados)
  - name: mecanimovil-db
    plan: basic-256mb  # Plan actual: Basic-256mb (no se puede hacer downgrade a Free)
    databaseName: mecanimovil
    user: mecanimovil
    postgresMajorVersion: "15"
    region: oregon
    # diskSizeGB: solo para planes pagos (ej: 15 para basic, 100 para pro)
    # PostGIS se habilita automáticamente en Render PostgreSQL

services:
  # ============================================
  # SERVICIO WEB PRINCIPAL (Django + Channels)
  # ============================================
  - type: web
    name: mecanimovil-api
    runtime: python
    plan: standard  # Producción: standard ($25/mes). NO cambiar a free.
    region: oregon  # Cambiar según tu ubicación preferida
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT mecanimovilapp.asgi:application
    healthCheckPath: /api/hello/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.mecanimovil.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString
      # Asistente IA: analizar-necesidad + candidatos-proveedor (consultas stateless)
      - key: AGENDAMIENTO_IA_ASISTIDO
        value: "True"
      # Fase 5 semántica (gratis por defecto, sin API de pago)
      - key: AGENDAMIENTO_IA_SEMANTICO_ENABLED
        value: "True"
      - key: AGENDAMIENTO_IA_SEMANTICO_PROVEEDOR
        value: "lexico"
      # Opcional tier gratuito (elegir uno): GEMINI_API_KEY o HUGGINGFACE_API_TOKEN
      # y AGENDAMIENTO_IA_SEMANTICO_PROVEEDOR=auto
      # Variables que debes configurar manualmente en Render Dashboard:
      # - MERCADOPAGO_ACCESS_TOKEN
      # - MERCADOPAGO_MODE (production o test)
      # - MERCADOPAGO_WEBHOOK_SECRET
      # - EMAIL_HOST_USER
      # - EMAIL_HOST_PASSWORD
      # - AWS_ACCESS_KEY_ID (para S3 si usas almacenamiento)
      # - AWS_SECRET_ACCESS_KEY
      # - AWS_STORAGE_BUCKET_NAME

  # ============================================
  # WORKER DE CELERY (Tareas asíncronas)
  # ============================================
  # NOTA: Los Background Workers requieren plan starter o superior
  # El plan 'free' NO soporta workers
  - type: worker
    name: mecanimovil-celery-worker
    runtime: python
    plan: starter  # Mínimo requerido: starter ($7/mes). También: standard ($25/mes)
    region: oregon
    buildCommand: ./build_worker.sh
    startCommand: celery -A mecanimovilapp worker -l info -Q default,heavy --concurrency=1 --pool=solo --max-tasks-per-child=50
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString

  # ============================================
  # CELERY BEAT (Tareas programadas)
  # ============================================
  # NOTA: Los Background Workers requieren plan starter o superior
  # El plan 'free' NO soporta workers
  - type: worker
    name: mecanimovil-celery-beat
    runtime: python
    plan: starter  # Mínimo requerido: starter ($7/mes). También: standard ($25/mes)
    region: oregon
    buildCommand: ./build_worker.sh
    startCommand: celery -A mecanimovilapp beat -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString

  # ============================================
  # REDIS (Cache, Channels, Celery Broker)
  # ============================================
  # IMPORTANTE: Un solo Redis sirve 3 workloads en DBs lógicas separadas:
  #   DB 0 = Channel Layer (mensajes WS)
  #   DB 1 = Django Cache (health data, responses)
  #   DB 2 = Celery Broker + Results
  # Con plan free (25MB) + allkeys-lru, la evicción puede matar mensajes
  # de Channels o tareas de Celery. Recomendación: mínimo starter ($10/mes).
  - type: keyvalue
    name: mecanimovil-redis
    plan: starter  # Upgraded: free (25MB) es insuficiente para 3 workloads concurrentes
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
