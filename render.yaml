# Render Blueprint - Configuración de infraestructura para MecaniMovil
# Documentación: https://render.com/docs/blueprint-spec

databases:
  # Base de datos PostgreSQL con PostGIS
  # Planes disponibles:
  # - free (gratis, expira en 30 días, 1GB storage)
  # - basic-256mb, basic-1gb, basic-4gb (planes básicos)
  # - pro-4gb, pro-8gb, pro-16gb, etc. (planes profesionales)
  # - accelerated-16gb, accelerated-32gb, etc. (planes acelerados)
  - name: mecanimovil-db
    plan: basic-256mb  # Plan actual: Basic-256mb (no se puede hacer downgrade a Free)
    databaseName: mecanimovil
    user: mecanimovil
    postgresMajorVersion: "15"
    region: oregon
    # diskSizeGB: solo para planes pagos (ej: 15 para basic, 100 para pro)
    # PostGIS se habilita automáticamente en Render PostgreSQL

services:
  # ============================================
  # SERVICIO WEB PRINCIPAL (Django + Channels)
  # ============================================
  - type: web
    name: mecanimovil-api
    runtime: python
    plan: standard  # Producción: standard ($25/mes). NO cambiar a free.
    region: oregon  # Cambiar según tu ubicación preferida
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT mecanimovilapp.asgi:application
    healthCheckPath: /api/hello/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.mecanimovil.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString
      # Asistente IA: analizar-necesidad + candidatos-proveedor (consultas stateless)
      - key: AGENDAMIENTO_IA_ASISTIDO
        value: "True"
      # Fase 5 semántica (gratis por defecto, sin API de pago)
      - key: AGENDAMIENTO_IA_SEMANTICO_ENABLED
        value: "True"
      - key: AGENDAMIENTO_IA_SEMANTICO_PROVEEDOR
        value: "lexico"
      # Asistente IA de reparación (guía por orden asignada)
      - key: ASISTENTE_DIAGNOSTICO_IA_ENABLED
        value: "True"
      - key: ASISTENTE_DIAGNOSTICO_IA_TIMEOUT
        value: "12"
      # Free tier: gemini-2.0-flash suele estar en 0/0; 3.1-flash-lite tiene ~500 req/día
      - key: GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      - key: ASISTENTE_DIAGNOSTICO_GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      # Asistente IA cotización chat omnicanal
      - key: ASISTENTE_COTIZACION_IA_ENABLED
        value: "True"
      - key: ASISTENTE_COTIZACION_IA_TIMEOUT
        value: "15"
      - key: ASISTENTE_COTIZACION_GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      # Opcional tier gratuito (elegir uno): GEMINI_API_KEY o HUGGINGFACE_API_TOKEN
      # y AGENDAMIENTO_IA_SEMANTICO_PROVEEDOR=auto
      # Variables que debes configurar manualmente en Render Dashboard:
      # - GEMINI_API_KEY (requerido para asistente de diagnóstico IA)
      # - GEMINI_LIMITE_TOKENS_MENSUAL (opcional, default 1000000 para alertas)
      # - MERCADOPAGO_ACCESS_TOKEN
      # - MERCADOPAGO_MODE (production o test)
      # - MERCADOPAGO_WEBHOOK_SECRET
      # - EMAIL_HOST_USER
      # - EMAIL_HOST_PASSWORD
      # - AWS_ACCESS_KEY_ID (para S3 si usas almacenamiento)
      # - AWS_SECRET_ACCESS_KEY
      # - AWS_STORAGE_BUCKET_NAME
      # Meta Omnichannel (WhatsApp / Messenger / Instagram):
      # - OMNICHANNEL_ENABLED=True
      # - META_APP_ID
      # - META_APP_SECRET
      # - META_VERIFY_TOKEN
      # - META_EMBEDDED_SIGNUP_CONFIG_ID
      # - META_EMBEDDED_SIGNUP_CONFIG_ID_WHATSAPP
      # - META_EMBEDDED_SIGNUP_CONFIG_ID_MESSENGER
      # - META_EMBEDDED_SIGNUP_CONFIG_ID_INSTAGRAM
      # - META_OAUTH_REDIRECT_URI=https://<api-host>/api/omnichannel/oauth/callback/
      # - META_GRAPH_API_VERSION=v21.0
      # Web Push VAPID (generadas localmente — NO subir al repo):
      # VAPID_PUBLIC_KEY=BN7Gtru3a4tdRrUe9cDw6hxsZax_3SiqxX8xCSXhWtFvoLYUfJfjs3KjCmHf-ix_NYVggp1B2o2rfLkjcako_ak
      # VAPID_PRIVATE_KEY=<tu clave privada — ver llaves generadas en setup>
      # VAPID_EMAIL=mailto:admin@mecanimovil.com

  # ============================================
  # WORKER DE CELERY (Tareas asíncronas)
  # ============================================
  # NOTA: Los Background Workers requieren plan starter o superior
  # El plan 'free' NO soporta workers
  - type: worker
    name: mecanimovil-celery-worker
    runtime: python
    plan: starter  # Mínimo requerido: starter ($7/mes). También: standard ($25/mes)
    region: oregon
    buildCommand: ./build_worker.sh
    startCommand: celery -A mecanimovilapp worker -l info -Q default,heavy --concurrency=1 --pool=solo --max-tasks-per-child=50
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString

  # ============================================
  # WORKER SCRAPER (Valoración mercado — Playwright)
  # ============================================
  - type: worker
    name: mecanimovil-scraper-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: chmod +x ./build_scraper_worker.sh ./scripts/start_scraper_worker.sh && ./build_scraper_worker.sh
    startCommand: ./scripts/start_scraper_worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/.playwright"
      # Token OAuth ML (developers.mercadolibre.cl) — sin esto el scrape falla con anti-bot
      - key: MERCADOLIBRE_ACCESS_TOKEN
        sync: false
      - key: MERCADOLIBRE_REFRESH_TOKEN
        sync: false
      - key: MERCADOLIBRE_CLIENT_ID
        sync: false
      - key: MERCADOLIBRE_CLIENT_SECRET
        sync: false
      # Proxy residencial opcional para Playwright
      - key: PLAYWRIGHT_PROXY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString

  # ============================================
  # CELERY BEAT (Tareas programadas)
  # ============================================
  # NOTA: Los Background Workers requieren plan starter o superior
  # El plan 'free' NO soporta workers
  - type: worker
    name: mecanimovil-celery-beat
    runtime: python
    plan: starter  # Mínimo requerido: starter ($7/mes). También: standard ($25/mes)
    region: oregon
    buildCommand: ./build_worker.sh
    startCommand: celery -A mecanimovilapp beat -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: keyvalue
          property: connectionString

  # ============================================
  # REDIS (Cache, Channels, Celery Broker)
  # ============================================
  # IMPORTANTE: Un solo Redis sirve 3 workloads en DBs lógicas separadas:
  #   DB 0 = Channel Layer (mensajes WS)
  #   DB 1 = Django Cache (health data, responses)
  #   DB 2 = Celery Broker + Results
  # Con plan free (25MB) + allkeys-lru, la evicción puede matar mensajes
  # de Channels o tareas de Celery. Recomendación: mínimo starter ($10/mes).
  - type: keyvalue
    name: mecanimovil-redis
    plan: starter  # Upgraded: free (25MB) es insuficiente para 3 workloads concurrentes
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
