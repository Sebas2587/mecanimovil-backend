# Render Blueprint - Configuración de infraestructura para MecaniMovil
# Documentación: https://render.com/docs/blueprint-spec

databases:
  # Base de datos PostgreSQL con PostGIS
  - name: mecanimovil-db
    plan: starter  # Cambiar a 'standard' para producción real
    databaseName: mecanimovil
    user: mecanimovil
    postgresMajorVersion: "15"
    # PostGIS se habilita automáticamente en Render PostgreSQL

services:
  # ============================================
  # SERVICIO WEB PRINCIPAL (Django + Channels)
  # ============================================
  - type: web
    name: mecanimovil-api
    runtime: python
    plan: starter  # Cambiar a 'standard' para producción real
    region: oregon  # Cambiar según tu ubicación preferida
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT mecanimovilapp.asgi:application
    healthCheckPath: /api/hello/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.mecanimovil.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: redis
          property: connectionString
      # Variables que debes configurar manualmente en Render Dashboard:
      # - MERCADOPAGO_ACCESS_TOKEN
      # - MERCADOPAGO_MODE (production o test)
      # - MERCADOPAGO_WEBHOOK_SECRET
      # - EMAIL_HOST_USER
      # - EMAIL_HOST_PASSWORD
      # - AWS_ACCESS_KEY_ID (para S3 si usas almacenamiento)
      # - AWS_SECRET_ACCESS_KEY
      # - AWS_STORAGE_BUCKET_NAME

  # ============================================
  # WORKER DE CELERY (Tareas asíncronas)
  # ============================================
  - type: worker
    name: mecanimovil-celery-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A mecanimovilapp worker -l info -Q default,heavy --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: mecanimovil-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: redis
          property: connectionString

  # ============================================
  # CELERY BEAT (Tareas programadas)
  # ============================================
  - type: worker
    name: mecanimovil-celery-beat
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A mecanimovilapp beat -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: mecanimovilapp.settings_production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: mecanimovil-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: mecanimovil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mecanimovil-redis
          type: redis
          property: connectionString

  # ============================================
  # REDIS (Cache, Channels, Celery Broker)
  # ============================================
  - type: redis
    name: mecanimovil-redis
    plan: starter  # Cambiar a 'standard' para producción real
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Permite conexiones solo desde servicios Render
