# Deploy manual en Render (solo cuando auto-deploy falle o para forzar redeploy).
#
# IMPORTANTE: los servicios ya tienen autoDeploy=commit en Render. NO ejecutar
# este workflow en cada push vía API además del auto-deploy: genera deploys
# duplicados y puede dejar la cola atascada en build_in_progress.
#
# Uso: GitHub → Actions → Trigger Render deploy → Run workflow
name: Trigger Render deploy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Render services (manual)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY no definida en GitHub Secrets."
            exit 1
          fi
          for svc in \
            srv-d5ig4ga4d50c739mhr30 \
            srv-d5ikvblactks73a6mt8g \
            srv-d5ikvblactks73a6mt90; do
            echo "Deploying $svc..."
            curl -fsS -X POST "https://api.render.com/v1/services/$svc/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
            echo
          done
